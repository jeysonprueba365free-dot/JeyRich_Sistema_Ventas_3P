<div class="contenedor-login">
  
  <div class="fondo-decorativo">
    <div class="circulo circulo-1"></div>
    <div class="circulo circulo-2"></div>
    <div class="circulo circulo-3"></div>
  </div>

  <div class="tarjeta-login shadow-lg">

    <div class="encabezado-login text-center mb-4">
      <div class="logo-wrapper mb-2">
        <img 
          src="JeyRich.png" 
          alt="JeyRich Logo" 
          class="logo-imagen"
        />
      </div>
      <p class="marca-subtitulo">Sistema de Gestión de Ventas</p>
    </div>

    <div
      *ngIf="mensajeError"
      class="alert alert-danger alerta-login d-flex align-items-center mb-4"
      role="alert"
    >
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <span>{{ mensajeError }}</span>
    </div>

    <div
      *ngIf="mensajeExito"
      class="alert alert-success alerta-login d-flex align-items-center mb-4"
      role="alert"
    >
      <i class="bi bi-check-circle-fill me-2"></i>
      <span>{{ mensajeExito }}</span>
    </div>

    <form (ngSubmit)="onSubmit()" #formularioLogin="ngForm" novalidate>

      <div class="mb-3 grupo-campo">
        <label for="nombreUsuario" class="form-label etiqueta-campo">
          <i class="bi bi-person-fill me-1"></i> Usuario
        </label>
        <div class="input-group input-grupo-personalizado">
          <span class="input-group-text icono-input">
            <i class="bi bi-person"></i>
          </span>
          <input
            type="text"
            id="nombreUsuario"
            name="nombreUsuario"
            class="form-control campo-texto"
            [(ngModel)]="credenciales.nombreUsuario"
            placeholder="Ingresa tu usuario"
            required
            minlength="3"
            #campoUsuario="ngModel"
            [class.is-invalid]="campoUsuario.invalid && campoUsuario.touched"
            autocomplete="username"
          />
          <div class="invalid-feedback" *ngIf="campoUsuario.invalid && campoUsuario.touched">
            <span *ngIf="campoUsuario.errors?.['required']">El usuario es requerido.</span>
            <span *ngIf="campoUsuario.errors?.['minlength']">Mínimo 3 caracteres.</span>
          </div>
        </div>
      </div>

      <div class="mb-4 grupo-campo">
        <label for="contrasena" class="form-label etiqueta-campo">
          <i class="bi bi-lock-fill me-1"></i> Contraseña
        </label>
        <div class="input-group input-grupo-personalizado">
          <span class="input-group-text icono-input">
            <i class="bi bi-lock"></i>
          </span>
          <input
            [type]="mostrarContrasena ? 'text' : 'password'"
            id="contrasena"
            name="contrasena"
            class="form-control campo-texto"
            [(ngModel)]="credenciales.contrasena"
            placeholder="Ingresa tu contraseña"
            required
            minlength="6"
            #campoContrasena="ngModel"
            [class.is-invalid]="campoContrasena.invalid && campoContrasena.touched"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="btn boton-ojo"
            (click)="toggleContrasena()"
            tabindex="-1"
          >
            <i class="bi" [class.bi-eye]="!mostrarContrasena" [class.bi-eye-slash]="mostrarContrasena"></i>
          </button>
          <div class="invalid-feedback" *ngIf="campoContrasena.invalid && campoContrasena.touched">
            <span *ngIf="campoContrasena.errors?.['required']">La contraseña es requerida.</span>
            <span *ngIf="campoContrasena.errors?.['minlength']">Mínimo 6 caracteres.</span>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input
            type="checkbox"
            id="recordarme"
            name="recordarme"
            class="form-check-input checkbox-personalizado"
            [(ngModel)]="recordarme"
          />
          <label for="recordarme" class="form-check-label texto-recordar">
            Recordarme
          </label>
        </div>
        <a href="https://api.whatsapp.com/send?phone=79971448&text=JeyRich%20Soporte%20Tecnio,%20me%20podrian%20ayudar!" class="enlace-olvidaste">Contactate con Soporte</a>
      </div>

      <button
        type="submit"
        class="btn boton-ingresar w-100 mb-3"
        [disabled]="cargando || formularioLogin.invalid"
      >
        <span *ngIf="!cargando">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar al Sistema
        </span>
        <span *ngIf="cargando">
          <span class="spinner-border spinner-border-sm me-2" role="status"></span>
          Verificando...
        </span>
      </button>

    </form>

    <div class="pie-tarjeta text-center mt-3">
      <small class="texto-pie">
        <i class="bi bi-shield-lock me-1"></i>
        Acceso restringido · Solo personal autorizado
      </small>
    </div>

  </div>

  <div class="version-sistema text-center mt-3">
    <small>JeyRich v1.0.0 &copy; {{ anioActual }}</small>
  </div>

</div>
